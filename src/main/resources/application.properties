spring.application.name=SpringAPI

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/xplorenow}
spring.datasource.username=${DB_USERNAME:xplorenow}
spring.datasource.password=${DB_PASSWORD:xplorenow}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Security
xplorenow.jwt.secret=ChangeThisSecretForProdAtLeast32Chars!
xplorenow.jwt.expiration-minutes=120

# OTP
xplorenow.otp.expiration-minutes=10
xplorenow.otp.max-attempts=5
