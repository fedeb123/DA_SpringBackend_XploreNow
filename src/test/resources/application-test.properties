spring.application.name=SpringAPI-test

spring.docker.compose.enabled=false

spring.datasource.url=jdbc:h2:mem:xplorenowtest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

xplorenow.jwt.secret=ThisIsATestOnlySecretWithAtLeast32Chars!
xplorenow.jwt.expiration-minutes=120
xplorenow.otp.expiration-minutes=10
xplorenow.otp.max-attempts=5
