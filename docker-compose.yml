services:
  postgres:
    image: postgres:16-alpine
    container_name: xplorenow
    environment:
      POSTGRES_DB: xplorenow
      POSTGRES_USER: xplorenow
      POSTGRES_PASSWORD: xplorenow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xplorenow -d xplorenow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
